x-hc-image-common: &hc-image-common 
  hiring-compass-au:latest

x-hc-volumes-prod: &hc-volumes-prod
  - ./secrets:/app/secrets
  - ./run/prod/data:/app/data
  - ./run/prod/logs:/app/logs

x-hc-volumes-dev: &hc-volumes-dev
  - ./:/app
  - ./secrets:/app/secrets

x-hc-command-job-alerts: &hc-command-job-alerts 
  ["python", "-m", "hiring_compass_au.data.pipelines.job_alerts"]

x-hc-env-prod: &hc-env-prod
  HC_ROOT: /app
  HC_SECRETS_DIR: /app/secrets

x-hc-env-dev: &hc-env-dev
  HC_ROOT: /app/run/dev
  HC_SECRETS_DIR: /app/secrets
  PYTHONPATH: /app/src


services:
  job-alerts-prod:
    image: *hc-image-common
    environment: *hc-env-prod
    volumes: *hc-volumes-prod
    command: *hc-command-job-alerts
    restart: "no"

  job-alerts-dev:
    image: *hc-image-common
    working_dir: /app
    environment: *hc-env-dev
    volumes: *hc-volumes-dev
    command: *hc-command-job-alerts
    restart: "no"

  job-alerts-oauth:
    profiles: ["oauth"]
    image: *hc-image-common
    environment:
      <<: *hc-env-prod
      HC_GMAIL_OAUTH_HOST: 0.0.0.0
      HC_GMAIL_OAUTH_PORT: 8080
      HC_GMAIL_OAUTH_OPEN_BROWSER: "0"
    ports:
      - "8080:8080"
    volumes: *hc-volumes-prod
    command: *hc-command-job-alerts
    restart: "no"
