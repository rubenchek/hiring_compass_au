name: hiring-compass-au

x-hc-entrypoint-job-alerts: &hc-entrypoint-job-alerts
  ["python", "-m", "hiring_compass_au.data.pipelines.job_alerts"]

x-hc-command-job-alerts: &hc-command-job-alerts
  []

x-hc-entrypoint-job-enrichment: &hc-entrypoint-job-enrichment
  ["python", "-m", "hiring_compass_au.services.job_enrichment"]

x-hc-command-job-enrichment: &hc-command-job-enrichment
  []

services:
  job-alerts:
    working_dir: /app
    command: *hc-command-job-alerts
    entrypoint: *hc-entrypoint-job-alerts
    restart: "no"

  job-enrichment:
    working_dir: /app
    command: *hc-command-job-enrichment
    entrypoint: *hc-entrypoint-job-enrichment
    restart: "no"

  job-alerts-oauth:
    profiles: ["oauth"]
    working_dir: /app
    command: *hc-command-job-alerts
    entrypoint: *hc-entrypoint-job-alerts
    ports:
      - "8080:8080"
    restart: "no"

  notify:
    working_dir: /app
    command:
      - python
      - -m
      - hiring_compass_au.data.pipelines.job_alerts.ops.notify_telegram
      - --attempts
      - "${HC_ATTEMPTS:-1}"
      - --exit-code
      - "${HC_EXIT_CODE:-0}"
    restart: "no"
